# Entire java Pipeline

name: Main-CI

on:
  workflow_dispatch:
    inputs:
      Artefacts_S3:
        description: 'Upload a artefacts into S3 only when initiate a CI manually'
        default: 'false'
        required: true
  push:
  pull_request:
    branch:
      - master

jobs:
  main_CI:
    name: Main CI  
    runs-on: ubuntu-latest

    steps:
      - name: git checkout
        uses: actions/checkout@v4

      - name: Maven deploy
        run: mvn clean install

      - name: File verification
        run: ls -lrt target/*

  upload_Artefacts:
      name: Upload Artefacts
      runs-on: ubuntu-latest
      needs: main_CI

      steps:
        - name: SSH setup
          if: github.event.inputs.Artefacts_S3 == 'true'
          run: |
            mkdir -p ~/.ssh
            echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
            chmod 600  ~/.ssh/id_ed25519
        
        - name: Upload File to Local
          if: github.event.inputs.Artefacts_S3 == 'true'
          run: scp target/*.jar ${{ secrets.USER_ID }}@${{ secrets.MACHINE_ID }}:${{ secrets.MACHINE_PATH }}
