# Entire java Pipeline

name: Main-CI

on:
  workflow_dispatch:
    inputs:
      Artefacts_S3:
        description: 'Upload a artefacts into S3 only when initiate a CI manually'
        default: 'false'
        required: true
  push:
  pull_request:
    branch:
      - master

jobs:
  main_CI:
    name: Main CI  
    runs-on: ubuntu-latest

    steps:
      - name: git checkout
        uses: actions/checkout@v4

      - name: Maven deploy
        run: mvn clean install

      - name: File verification
        run: ls -lrt target/*

      - name: Upload Artefacts
        if: github.event.inputs.Artefacts_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: java_jar
          path: target/*.jar
          retention-days: 1

  upload_Artefacts:
      name: Upload Artefacts
      runs-on: ubuntu-latest
      needs: main_CI

      steps:
        - name: github secret values
          run: |
            echo ${{ secrets.MACHINE_ID }}
            echo ${{ secrets.USER_ID }}
            echo ${{ secrets.MACHINE_PATH }}
            echo ${{ secrets.SSH_KEY }}

        - name: SSH setup
          if: github.event.inputs.Artefacts_S3 == 'true'
          run: |
            mkdir -p ~/.ssh
            echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
            chmod 600  ~/.ssh/id_ed25519
            echo -e "Host *\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config
            ssh-keyscan -H ${{ secrets.MACHINE_ID }} >> ~/.ssh/known_hosts
            ls -lrt ~/.ssh/*
        
        - name: Download Artefacts
          if: github.event.inputs.Artefacts_S3 == 'true'
          uses: actions/download-artifact@v4
          with:
            name: java_jar
            path: target/

        - name: Upload File to Local
          if: github.event.inputs.Artefacts_S3 == 'true'
          run: scp -i  ~/.ssh/id_ed25519  target/*.jar ${{ secrets.USER_ID }}@${{ secrets.MACHINE_ID }}:${{ secrets.MACHINE_PATH }}
