# Entire java Pipeline

name: Main-CI

on:
  workflow_dispatch:
    inputs:
      Artefacts_S3:
        description: 'Upload a docker image to dockerhub when initiate a CI manually'
        default: 'false'
        required: true
  push:
  pull_request:
    branch:
      - master

jobs:
  main_CI:
    name: Main CI  
    runs-on: ubuntu-latest

    steps:
      - name: git checkout
        uses: actions/checkout@v4

      - name: Maven deploy
        run: mvn clean install

      - name: File verification
        run: ls -lrt target/*

      - name: Upload Artefacts
        if: github.event.inputs.Artefacts_S3 == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: java_jar
          path: target/*.jar
          retention-days: 1

  upload_Artefacts:
      name: Upload Artefacts
      runs-on: ubuntu-latest
      needs: main_CI

      steps:

        - name: Download Artefacts
          if: github.event.inputs.Artefacts_S3 == 'true'
          uses: actions/download-artifact@v4
          with:
            name: java_jar
            path: target/

        - name: login to dockerhub
            if: github.event.inputs.Artefacts_S3 == 'true'
            uses: docker/login-action@v3
            with:
              user_nmae: ${{ secrets.DOCKERHUB_USERNAME }}
              password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Build Docker Image
            if: github.event.inputs.Artefacts_S3 == 'true'
            run: |
              docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/myapp:${{ github.run_number }} .

        - name: Push Docker Image
            if: github.event.inputs.Artefacts_S3 == 'true'
            run: |
              docker push ${{ secrets.DOCKERHUB_USERNAME }}/myapp:${{ github.run_number }}

